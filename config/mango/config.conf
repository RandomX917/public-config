# Example autostart entries
exec-once = waybar -c ~/.config/mango/config.jsonc -s ~/.config/mango/style.css & disown 
exec-once = swaybg

bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=SUPER,m,spawn,waypaper
bind=SUPER,q,spawn,foot
bind=SUPER,b,spawn,zen
bind=SUPER,d,spawn,$HOME/.config/mango/menu.sh
bind=SUPER,s,spawn,$HOME/.config/mango/snip.sh
bind=SUPER,R,spawn,$HOME/.config/mango/rebar.sh
bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9
bind=SUPER,i,incnmaster,+1
bind=SUPER,p,incnmaster,-1
bind=SUPER,w,killclient
bind=SUPER+SHIFT,r,reload_config
# Layouts
bind=SUPER,n,switch_layout
bind=SUPER,z,togglegaps
# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

# Send current window to scratchpad
bind=SUPER+SHIFT,a,minimized

# Toggle (show/hide) the scratchpad
bind=SUPER,a,toggle_scratchpad

# Retrieve window from scratchpad (restore)
bind=SUPER+ALT,a,restore_minimized

gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=1
no_border_when_single=1
focuscolor=0xffffff11
bordercolor=0x44444411
# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER+SHIFT,btn_left,moveresize,curresize

# options
repeat_rate=35
repeat_delay=200

# Effect
border_radius=1
no_radius_when_single=1
blur=1
blur_layer=1
blur_optimized=0
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.0
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 1
shadow_only_floating=1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=50
animation_duration_open=40
animation_duration_tag=30
animation_duration_close=40
animation_curve_open=0.2,1.0,0.29,1.1
animation_curve_move=0.2,1.0,0.29,1
animation_curve_tag=0.2,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

# smartmovewin
bind=SUPER+ALT,k,smartmovewin,up
bind=SUPER+ALT,j,smartmovewin,down
bind=SUPER+ALT,h,smartmovewin,left
bind=SUPER+ALT,l,smartmovewin,right
bind=SUPER+ALT,up,smartmovewin,up
bind=SUPER+ALT,down,smartmovewin,down
bind=SUPER+ALT,left,smartmovewin,left
bind=SUPER+ALT,right,smartmovewin,right

bind=SUPER,l,spawn,hyprlock
# switch window focus 
bind=SUPER,down,focusstack,next
bind=SUPER,up,focusstack,prev
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,down,exchange_client,down
bind=SUPER+SHIFT,left,exchange_client,left
bind=SUPER+SHIFT,right,exchange_client,right


# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft
gesturebind=none,right,4,viewtoright
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
bind=SUPER,0,toggleoverview

windowrule=isfloating:1,width:600,height:450,appid:foot
windowrule=isfloating:1,width:600,height:450,appid:waypaper
