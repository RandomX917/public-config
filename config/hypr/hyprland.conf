#Monitors(tbf idk what this does)
monitor=,preferred,auto,auto
# variables for tools(change if you have any other ones
$terminal = foot
$fileManager = dolphin
$menu = rofi -show drun
# start programs on log in
exec-once = python3 ~/scripts/infinite_desktop_core.py /dev/input/event0 /dev/input/event8 1.6
exec-once = python3 ~/scripts/infinite_desktop_core.py /dev/input/event0 /dev/input/event1 1.6
exec-once = python3 ~/scripts/infinite_desktop_core.py /dev/input/event0 /dev/input/event15 1.6
exec-once = /home/random/scripts/infinite-desktop.sh
 exec-once = $terminal
 exec-once = exit
 exec-once = waybar 
exec-once = swaync
env = XCURSOR_SIZE,15
env = HYPRCURSOR_SIZE,15
env = XCURSOR_THEME,Adwaita
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}
decoration {
    rounding = 0
    rounding_power =10
#    active_opacity = 0.80
#    inactive_opacity = 0.80
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 4
        passes = 2
        noise = 0.0
        vibrancy = 0.1
    }
}
animations {
    enabled = yes
    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
#i also dont know what this is 
   bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     6, default, slidevert
    animation = workspacesIn,  1,     1.21,  default, slidevert
    animation = workspacesOut, 1,     1.94,  quick, fade
    animation = zoomFactor,    1,     7,     quick
}
dwindle {
    preserve_split = true # You probably want this
}
# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}
#neither here

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = 1 # If true disables the random hyprland logo / anime girl background. :(
}
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}
gesture = 3, vertical, workspace
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
#welcome to organization hell
#i add these wherever so better start ctrl+f'ing or /'ing
binde = SUPER SHIFT, left, moveactive, -40 0
binde = SUPER SHIFT, right, moveactive, 40 0
binde = SUPER SHIFT, up, moveactive, 0 -40
binde = SUPER SHIFT, down, moveactive, 0 40
#See the README in scripts for more info abt these
bind = CTRL SUPER, right, exec, echo right > /tmp/infinite-nav
bind = CTRL SUPER, left, exec, echo left > /tmp/infinite-nav

bind = SUPER, Z, exec, waypaper
bind = SUPER SHIFT, R, exec, pkill waybar && waybar
bind = SUPER, Q, exec, $terminal
bind = SUPER, W, killactive,
binde = SUPER, Delete, killactive
binde = SUPER, Print, exec, $terminal
bind = SUPER, M, exit,
bind = SUPER, E, exec, $fileManager
bind = SUPER, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 720 420 && hyprctl dispatch centerwindow
bind = SUPER, R, exec, obs
bind = SUPER, D, exec, $menu
bind = SUPER, T, exec, rofi -show run
bind = SUPER, B, exec, zen
bind = SUPER, L, exec, hyprlock
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER, A, togglespecialworkspace, magic
bind = SUPER SHIFT, A, movetoworkspace, special:magic
bind = SUPER, C, exec, sh -c "pgrep hyprsunset && pkill hyprsunset || hyprsunset -t 3500"
bind = SUPER, mouse_right, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1
bindm = SUPER, mouse:272, movewindow
bindm = SUPER SHIFT, mouse:272, resizewindow
bindm = SUPER, mouse:273, resizewindow
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4  set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4  set 5%-
bind = SUPER, Tab, exec, hyprctl dispatch spawnatcursor foot
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , switch:Lid Switch, exec, hyprlock
bind = SUPER, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
windowrule {
   name = workspace-float
   float = 0
    match:class = .*
    workspace = 
}
# If you want floating on by default uncomment all this ig
#windowrule {
#    name = float-all
#    match:class = .*
#    float = 1
#}
windowrule {
	name = zen
	match:initial_class = zen
	opacity = 1 override 
}
windowrule {
	name = waypaper
	match:initial_class = waypaper
	opacity = 1 override 
	float = 1
        size = 800 560
        center = 1
}
layerrule = blur off, match:initial_class zen
#rofi shi
layerrule = ignore_alpha 0.3, match:namespace rofi
layerrule = blur on, match:namespace rofi
